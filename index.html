<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 틱택토 데모</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🤖 틱택토 AI 데모</h1>
        
        <div class="controls">
            <button id="btn-first" class="btn active">내가 선공 (O)</button>
            <button id="btn-second" class="btn">AI가 선공 (X)</button>
        </div>

        <div id="status" class="status">모델을 불러오는 중입니다...</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="btn-reset" class="btn reset" disabled>다시 하기</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
